name: 📬 دریافت کد تأیید با ایمیل موقت

on:
  workflow_dispatch:

jobs:
  fetch-otp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - run: python temp_mail_otp.py   # یا temp_mail_guerrilla.py
